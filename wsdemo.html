<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Status Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .header {
      background: #075E54;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    .body { padding: 20px; }
    .product-img {
      width: 100%;
      height: 200px;
      background: #e8f5e9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-size: 64px;
    }
    .product-name {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }
    .product-price {
      font-size: 22px;
      font-weight: 700;
      color: #075E54;
      margin-bottom: 20px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .btn-green { background: #25D366; color: #fff; }
    .btn-green:active { background: #1ebe58; }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #ddd;
      color: #333;
    }
    .btn-outline:active { background: #f5f5f5; }
    .log {
      margin-top: 16px;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      min-height: 52px;
      color: #555;
    }
    .ok { color: #1a7a3a; font-weight: 600; }
    .err { color: #c0392b; font-weight: 600; }
    .warn { color: #d68910; font-weight: 600; }
    .support-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    canvas { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">Nano Tienda — Demo WhatsApp Status</div>
  <div class="body">

    <div class="product-img">👕</div>
    <div class="product-name">Camiseta Clásica Verde</div>
    <div class="product-price">$45.000 COP</div>

    <button class="btn btn-green" onclick="shareToStatus()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="18" cy="5" r="3" stroke="white" stroke-width="2"/>
        <circle cx="6" cy="12" r="3" stroke="white" stroke-width="2"/>
        <circle cx="18" cy="19" r="3" stroke="white" stroke-width="2"/>
        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" stroke="white" stroke-width="2"/>
      </svg>
      Compartir en WhatsApp Status
    </button>

    <button class="btn btn-outline" onclick="checkSupport()">Ver soporte del dispositivo</button>

    <div class="log" id="log">Presiona un botón para probar...</div>

    <canvas id="canvas" width="800" height="800"></canvas>
  </div>
</div>

<script>
  function log(html) {
    document.getElementById('log').innerHTML = html;
  }

  function buildCanvas() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#e8f5e9';
    ctx.fillRect(0, 0, 800, 800);

    ctx.fillStyle = '#2E7D32';
    ctx.font = 'bold 52px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Camiseta Clásica Verde', 400, 120);

    ctx.fillStyle = '#075E54';
    ctx.font = 'bold 64px -apple-system, sans-serif';
    ctx.fillText('$45.000 COP', 400, 210);

    ctx.font = '140px serif';
    ctx.fillText('👕', 400, 430);

    ctx.fillStyle = '#25D366';
    ctx.beginPath();
    ctx.roundRect(150, 520, 500, 100, 20);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px -apple-system, sans-serif';
    ctx.fillText('Ver en mi tienda', 400, 582);

    ctx.fillStyle = '#888';
    ctx.font = '32px -apple-system, sans-serif';
    ctx.fillText('nanotienda.com/mi-tienda', 400, 720);

    return canvas;
  }

  async function shareToStatus() {
    if (!navigator.share) {
      log('<span class="err">Web Share API no soportada en este navegador.</span>');
      return;
    }

    try {
      log('Generando imagen...');

      const canvas = buildCanvas();

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const file = new File([blob], 'producto-nano-tienda.png', { type: 'image/png' });

      if (navigator.canShare && !navigator.canShare({ files: [file] })) {
        log('<span class="warn">Este dispositivo no soporta compartir archivos.</span>');
        return;
      }

      await navigator.share({
        files: [file],
        text: '🛍️ Camiseta Clásica Verde — $45.000 COP\nVer en: nanotienda.com/mi-tienda'
      });

      log('<span class="ok">Compartido correctamente.</span>');

    } catch (e) {
      if (e.name === 'AbortError') {
        log('<span class="warn">Cancelado por el usuario.</span>');
      } else {
        log(`<span class="err">Error: ${e.message}</span>`);
      }
    }
  }

  function checkSupport() {
    const checks = [
      ['Web Share API (navigator.share)', !!navigator.share],
      ['Compartir archivos (navigator.canShare)', !!navigator.canShare],
      ['Es iPhone/iPad', /iPhone|iPad/i.test(navigator.userAgent)],
      ['Es Android', /Android/i.test(navigator.userAgent)],
    ];

    const html = checks.map(([label, ok]) =>
      `<div class="support-row">
        <span>${label}</span>
        <span class="${ok ? 'ok' : 'err'}">${ok ? '✓ Sí' : '✗ No'}</span>
      </div>`
    ).join('');

    log(html);
  }
</script>

</body>
</html>
